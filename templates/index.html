<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Rezerwacji</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark mb-4 custom-nav">
        <div class="container">
            <span class="navbar-brand mb-0 h1">System Zarządzania Rezerwacjami</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h2 class="mb-4">Dostępne Sale Konferencyjne</h2>
                <div class="row">
                    {% for room in rooms %}
                    <div class="col-md-4 mb-3">
                        <div class="card shadow-sm room-card">
                            <div class="card-body">
                                <h5 class="card-title text-primary">{{ room.name }}</h5>
                                <p class="card-text">
                                    <strong>Miejsca:</strong> {{ room.capacity }}<br>
                                    <strong>Rzutnik:</strong> {{ "✅ Tak" if room.has_projector else "❌ Brak" }} 
                                </p>
                                <button class="btn btn-outline-primary w-100">Zarezerwuj</button>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
