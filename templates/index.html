<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Rezerwacji</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark mb-4 custom-nav">
        <div class="container">
            <span class="navbar-brand mb-0 h1">System Zarządzania Rezerwacjami</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-success mb-3">➕ Dodaj nową salę</h5>
                        <form id="addRoomForm">
                            <div class="mb-3">
                                <label for="roomName" class="form-label">Nazwa sali</label>
                                <input type="text" class="form-control" id="roomName" required>
                            </div>
                            <div class="mb-3">
                                <label for="roomCapacity" class="form-label">Liczba miejsc</label>
                                <input type="number" class="form-control" id="roomCapacity" required min="1">
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="roomProjector">
                                <label class="form-check-label" for="roomProjector">Rzutnik w sali</label>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Dodaj salę</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <h2 class="mb-4">Dostępne Sale Konferencyjne</h2>
                <div class="row">
                    {% for room in rooms %}
                    <div class="col-md-6 mb-3">
                        <div class="card shadow-sm room-card h-100">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title text-primary">{{ room.name }}</h5>
                                <p class="card-text mb-4">
                                    <strong>Miejsca:</strong> {{ room.capacity }}<br>
                                    <strong>Rzutnik:</strong> {{ "✅ Tak" if room.has_projector else "❌ Brak" }} 
                                </p>
                                <div class="mt-auto">
                                    <button class="btn btn-outline-primary w-100 mb-2">Zarezerwuj</button>
                                    <button class="btn btn-outline-secondary w-100 mb-2" 
                                        data-id="{{ room.id }}" 
                                        data-name="{{ room.name }}" 
                                        data-capacity="{{ room.capacity }}" 
                                        data-projector="{{ 'true' if room.has_projector else 'false' }}"
                                        onclick="openEditModal(this)">✏️ Edytuj</button>
                                    <button class="btn btn-outline-danger w-100" data-id="{{ room.id }}" onclick="deleteRoom(this.dataset.id)">🗑️ Usuń salę</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editRoomModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">✏️ Edytuj Salę</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editRoomForm">
                        <input type="hidden" id="editRoomId">
                        <div class="mb-3">
                            <label class="form-label">Nazwa sali</label>
                            <input type="text" class="form-control" id="editRoomName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Liczba miejsc</label>
                            <input type="number" class="form-control" id="editRoomCapacity" required min="1">
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="editRoomProjector">
                            <label class="form-check-label">Rzutnik w sali</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Zapisz zmiany</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
